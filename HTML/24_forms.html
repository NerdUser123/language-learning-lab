<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="/contact-me">
        <label for="email">email</label>
        <input type="text" id="email" placeholder="enter text" required>
        <br><br>

        <label for="userpass">password</label>
        <input type="password" id="userpass" placeholder="enter password">
        <br><br>

        <input type="date">
        <br><br>

        <input type="file">
        <br><br>

        <input type="color">
        <br><br>

        <input type="range">
        <br><br>

        <input type="button" value="submit ( button tag )">
        <br><br>

        <input type="submit" value="submit :)">
        <br><br>

        <label for="male">male  </label>
        <input type="radio" id="male" name="gender" value="male"> 
        <br>
        <label for="female">female</label>
        <input type="radio" id="female" name="gender" value="female">
        <br>  
        <label for="other">other </label>
        <input type="radio" name="gender" id="other" value="other">
        <br><br>

        <label for="male">male  </label>
        <input type="checkbox" id="male" name="gender" value="male"> 
        <br>
        <label for="female">female</label>
        <input type="checkbox" id="female" name="gender" value="female">
        <br>  
        <label for="other">other </label>
        <input type="checkbox" name="gender" id="other" value="other">
        <br><br>

        <label for="fruits">select a fruit</label>
        <select name="fruit" id="fruits">
            <option value="apple">apple</option>
            <option value="banana">banana</option>
            <option value="orange">orange</option>
        </select>
        <br><br>

        <textarea name="story" id="story" rows="4" cols="40">add your text here: </textarea>
        <br><br>

        <input type="submit">
    </form>
</body>
</html>
